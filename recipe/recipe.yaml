context:
  version: "1.0.4"

package:
  name: xojs
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/xo/-/xo-${{ version }}.tgz
  sha256: 932451ce8b3fefa2175b170410a52b4de4bfa073f539383e808e29c87cca0c98

build:
  number: 0
  noarch: generic

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - xo --help

about:
  license: MIT
  license_file:
    - license
    - third-party-licenses.txt
  summary: JavaScript/TypeScript linter (ESLint wrapper) with great defaults
  homepage: https://github.com/xojs/xo
  repository: https://github.com/xojs/xo

extra:
  recipe-maintainers:
    - danielnachun
